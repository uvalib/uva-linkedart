<!DOCTYPE html>
<div class="row">
    <div class="col-md-6">
        Showing records <strong>{{((page_num - 1) * limit) + 1}}</strong> to <strong>{{count if count < (page_num * limit) else page_num * limit}}</strong> of <strong>{{count}}</strong> results.
    </div>
    <div class="col-md-6">
        <nav aria-label="Page navigation">
            <ul class="pagination justify-content-end">
                <li class="page-item{{' disabled' if page_num == 1 else '' }}">
                    <a class="page-link" href="?page=1">First</a>
                </li>
                <li class="page-item{{' disabled' if page_num == 1 else '' }}">
                    <a class="page-link" href="?page={{page_num - 1}}">Previous</a
                    ></li>                                    
                <li class="page-item active">
                    <a class="page-link" href="#">{{page_num}}</a>
                </li>                                    
                <li class="page-item{{' disabled' if page_num == last else '' }}">
                    <a class="page-link" href="?page={{page_num + 1}}">Next</a>
                </li>
                <li class="page-item{{' disabled' if page_num == last else '' }}">
                    <a class="page-link" href="?page={{last}}">Last</a>
                </li>
            </ul>
        </nav>
    </div>
</div>
